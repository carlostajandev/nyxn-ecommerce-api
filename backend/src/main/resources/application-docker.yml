# ─── Docker profile ───────────────────────────────────────────────────────────
# Activated via SPRING_PROFILES_ACTIVE=docker in docker-compose.yml.
# All infrastructure coordinates come from environment variables injected by
# docker-compose; this file only sets values that differ from the defaults in
# application.yml and cannot be expressed as env-var overrides cleanly.

spring:
  cloud:
    gcp:
      project-id: ${SPRING_CLOUD_GCP_PROJECT_ID:local-project}
      pubsub:
        # When PUBSUB_EMULATOR_HOST is set, Spring Cloud GCP auto-configuration
        # redirects all Pub/Sub calls to the emulator — no service account needed.
        emulator-host: ${SPRING_CLOUD_GCP_PUBSUB_EMULATOR_HOST:}
      secretmanager:
        # Disable Secret Manager entirely in docker/local profiles.
        # The GcpSecretManagerAutoConfiguration tries to create a client at startup
        # and fails with "default credentials not found" when no ADC is configured.
        # Production secrets are injected via Cloud Run --set-secrets instead.
        enabled: false

logging:
  level:
    com.nyxn: DEBUG
    com.google.cloud: WARN
