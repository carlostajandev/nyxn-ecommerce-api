spring:
  application:
    name: nyxn-ecommerce-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nyxn_ecommerce}
    username: ${DB_USERNAME:nyxn}
    password: ${DB_PASSWORD:nyxn}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  cache:
    type: redis

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:https://accounts.google.com}

nyxn:
  pubsub:
    topics:
      product-events: ${PUBSUB_TOPIC_PRODUCT_EVENTS:product-events}
      order-events: ${PUBSUB_TOPIC_ORDER_EVENTS:order-events}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.nyxn: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
