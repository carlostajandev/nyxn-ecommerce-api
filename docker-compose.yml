version: '3.9'

# ─── Networks ──────────────────────────────────────────────────────────────────
# Explicit bridge network so containers resolve each other by service name.
# Without a named network every service is on the default bridge where name
# resolution still works, but an explicit network makes the intent clear and
# allows future per-tier network segmentation (e.g. separate db-net vs app-net).
networks:
  nyxn-net:
    driver: bridge

# ─── Variables ─────────────────────────────────────────────────────────────────
# docker-compose automatically reads .env from the same directory for variable
# interpolation. Copy .env.example to .env and fill in the values before running.
# Never commit .env to version control — it is in .gitignore.

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nyxn-postgres
    networks: [nyxn-net]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nyxn_ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-nyxn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nyxn} -d ${POSTGRES_DB:-nyxn_ecommerce}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nyxn-redis
    networks: [nyxn-net]
    ports:
      - "6379:6379"
    # appendonly yes: every write is persisted immediately. Slower than RDB snapshots
    # but guarantees at-most-one-second data loss on crash instead of up to 60 seconds.
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── GCP Pub/Sub emulator ────────────────────────────────────────────────────
  # Provides a local Pub/Sub API without GCP credentials or network access.
  # The emulator is API-compatible with the real service — Spring Cloud GCP
  # switches between them via PUBSUB_EMULATOR_HOST environment variable.
  pubsub-emulator:
    image: google/cloud-sdk:alpine
    container_name: nyxn-pubsub-emulator
    networks: [nyxn-net]
    ports:
      - "8085:8085"
    command: >
      gcloud beta emulators pubsub start
      --project=${GCP_PROJECT_ID:-local-project}
      --host-port=0.0.0.0:8085
    healthcheck:
      # The emulator exposes a plain HTTP endpoint; a 200 on / means it is ready.
      test: ["CMD-SHELL", "curl -sf http://localhost:8085 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

  # ─── Pub/Sub topic & subscription init ──────────────────────────────────────
  # One-shot init container that creates topics and subscriptions after the
  # emulator is healthy. The DLQ topic (product-events-dlq) is configured as the
  # dead-letter topic on the product-events-subscription with max 5 delivery
  # attempts — after 5 consecutive nacks the emulator routes the message to the
  # DLQ, preventing a poison-pill message from blocking the subscription forever.
  pubsub-init:
    image: google/cloud-sdk:alpine
    container_name: nyxn-pubsub-init
    networks: [nyxn-net]
    depends_on:
      pubsub-emulator:
        condition: service_healthy
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
    command: >
      sh -c "
        gcloud config set project ${GCP_PROJECT_ID:-local-project} &&

        gcloud pubsub topics create product-events        --project=${GCP_PROJECT_ID:-local-project} &&
        gcloud pubsub topics create product-events-dlq    --project=${GCP_PROJECT_ID:-local-project} &&
        gcloud pubsub topics create order-events          --project=${GCP_PROJECT_ID:-local-project} &&
        gcloud pubsub topics create order-events-dlq      --project=${GCP_PROJECT_ID:-local-project} &&

        gcloud pubsub subscriptions create product-events-subscription
          --topic=product-events
          --dead-letter-topic=product-events-dlq
          --max-delivery-attempts=5
          --ack-deadline=30
          --project=${GCP_PROJECT_ID:-local-project} &&

        gcloud pubsub subscriptions create order-events-subscription
          --topic=order-events
          --dead-letter-topic=order-events-dlq
          --max-delivery-attempts=5
          --ack-deadline=30
          --project=${GCP_PROJECT_ID:-local-project} &&

        echo 'Pub/Sub topics and subscriptions created.'
      "
    # restart: on-failure so that if the init container fails (race with emulator),
    # Docker retries it without operator intervention.
    restart: on-failure

  # ─── Spring Boot API (backend/) ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nyxn-api
    networks: [nyxn-net]
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nyxn_ecommerce}
      DB_USERNAME: ${POSTGRES_USER:-nyxn}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      SPRING_CLOUD_GCP_PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      SPRING_CLOUD_GCP_PROJECT_ID: ${GCP_PROJECT_ID:-local-project}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # pubsub-init is not strictly required by the backend (Spring Cloud GCP
      # retries subscription/topic access), but waiting avoids noisy error logs
      # during the first few seconds of startup.
      pubsub-init:
        condition: service_completed_successfully

  # ─── NestJS Notification Service (notification-service/) ─────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: nyxn-notification
    networks: [nyxn-net]
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-local-project}
      PUBSUB_SUBSCRIPTION_PRODUCT_EVENTS: product-events-subscription
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      pubsub-emulator:
        condition: service_healthy
      # Wait until the init container has created the topics and subscriptions.
      # Without this, NestJS would try to attach to product-events-subscription
      # before it exists and receive a gRPC NOT_FOUND error on startup.
      pubsub-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
