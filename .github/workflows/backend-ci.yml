name: Backend CI

# Trigger only when backend/ files change. A documentation-only commit does not
# run the full Maven build. monorepo path filters avoid unnecessary compute.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    # Docker is required for Testcontainers (PostgreSQL + Redis integration tests).
    # ubuntu-latest runners have Docker pre-installed and the daemon is running.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Cache the local Maven repository keyed on pom.xml hash.
          # This cuts ~60 s off the build time on cache hit by skipping downloads.
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Check code format (Spotless)
        working-directory: backend
        run: mvn spotless:check -q
        # Fail fast on format violations before spending time on compilation.

      - name: Compile
        working-directory: backend
        run: mvn compile -q

      - name: Run unit tests
        working-directory: backend
        run: |
          mvn test \
            -Dtest="ProductTest,CreateProductUseCaseTest,PlaceOrderServiceTest,StockReservationServiceTest,ConcurrentStockReservationTest" \
            -q

      - name: Run integration tests
        working-directory: backend
        # IT tests spin up Testcontainers (PostgreSQL + Redis). Docker is required.
        # Separate step so unit test results are visible even if ITs fail.
        run: mvn verify -DskipUnitTests -q
        continue-on-error: false

      - name: Build Docker image (smoke test)
        # Build the image without pushing to verify the Dockerfile is valid.
        # A broken Dockerfile would only be caught at deploy time otherwise.
        run: |
          docker build -t nyxn-api:ci backend/
          echo "Docker image built successfully"

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Run Checkstyle
        working-directory: backend
        run: mvn checkstyle:check -q
