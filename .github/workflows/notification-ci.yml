name: Notification Service CI

on:
  push:
    branches: [main]
    paths:
      - 'notification-service/**'
      - '.github/workflows/notification-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'notification-service/**'
      - '.github/workflows/notification-ci.yml'

env:
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nyxn/notification

jobs:
  # ── Job 1: Verify ──────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: notification-service/package-lock.json

      - name: Install dependencies
        working-directory: notification-service
        run: npm ci --silent

      - name: Lint
        working-directory: notification-service
        run: npm run lint

      - name: TypeScript compile
        working-directory: notification-service
        run: npm run build

      - name: Unit tests
        working-directory: notification-service
        env:
          ANTHROPIC_API_KEY: test-placeholder
          GCP_PROJECT_ID: local-project
        run: npm test -- --passWithNoTests

      - name: Coverage report
        working-directory: notification-service
        env:
          ANTHROPIC_API_KEY: test-placeholder
          GCP_PROJECT_ID: local-project
        run: npm run test:cov -- --passWithNoTests
        continue-on-error: true

  # ── Job 2: Docker Build & Push ─────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            notification-service/

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # ── Job 3: Deploy to Cloud Run ─────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.CLOUD_RUN_NOTIFICATION_SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: |
            --set-secrets ANTHROPIC_API_KEY=claude-api-key:latest
            --set-env-vars NODE_ENV=production
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            --set-env-vars PUBSUB_SUBSCRIPTION_PRODUCT_EVENTS=product-events-subscription
            --platform managed
            --allow-unauthenticated
            --min-instances 1
            --max-instances 5
            --memory 512Mi
            --cpu 1

      - name: Verify deployment health
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ secrets.CLOUD_RUN_NOTIFICATION_SERVICE }} \
            --region=${{ secrets.GCP_REGION }} \
            --format='value(status.url)' \
            --project=${{ secrets.GCP_PROJECT_ID }})
          echo "Service URL: $SERVICE_URL"
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/health" || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 10s..."
            sleep 10
          done
          echo "Health check did not pass after 120s"
          exit 1

# ─── Required GitHub Actions secrets ─────────────────────────────────────────
# GCP_PROJECT_ID                 → GCP project ID
# GCP_SA_KEY                     → Service account JSON key
# GCP_REGION                     → Cloud Run region (e.g. us-central1)
# CLOUD_RUN_NOTIFICATION_SERVICE → Cloud Run service name (e.g. nyxn-notification)
